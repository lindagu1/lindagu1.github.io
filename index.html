<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linda Gu | Desktop Portfolio</title>
  <meta name="description" content="A desktop-inspired portfolio homepage for Linda Gu.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fontawesome/css/fontawesome-all.min.css">
  <link rel="stylesheet" href="site.css">
</head>
<body class="page-home">
  <main class="desktop-shell">
    <section class="desktop-board">
      <div class="desktop-grid" aria-hidden="true"></div>

      <a class="desktop-folder projects-folder" href="projects.html">
        <img class="folder-illustration" src="assets/folder-projects.png" alt="">
        <span class="folder-name">projects</span>
      </a>

      <a class="desktop-folder experience-folder" href="experience.html">
        <img class="folder-illustration" src="assets/folder-experience.png" alt="">
        <span class="folder-name">experience</span>
      </a>

      <a class="desktop-folder interests-folder" href="interests.html">
        <img class="folder-illustration" src="assets/folder-interests.png" alt="">
        <span class="folder-name">interests</span>
      </a>

      <section class="hero-window" aria-label="Profile window">
        <div class="window-bar home-window-bar">
          <div class="window-controls" aria-hidden="true">
            <span class="control close"></span>
            <span class="control minimize"></span>
            <span class="control maximize"></span>
          </div>
          <div class="window-path">C:\LINDA\portfolio</div>
        </div>

        <div class="hero-window-body">
          <div class="profile-photo">
            <div class="profile-photo-art">
              <img src="assets/headshot-crop.jpg" alt="Linda Gu headshot">
            </div>
          </div>

          <div class="hero-copy">
            <p class="eyebrow">hi! i'm</p>
            <h1>Linda Gu</h1>
            <p class="role-line">ORIE @ Cornell</p>
            <p class="hero-text">
              I like making thoughtful digital work feel warm, clear, and human. Open a folder to see my projects,
              experience, and interests.
            </p>
          </div>
        </div>
      </section>

      <div class="sticker-hover sticker-one">
        <img class="custom-sticker" src="assets/sticker-phone.png" alt="">
      </div>
      <div class="sticker-hover sticker-two">
        <img class="custom-sticker" src="assets/sticker-cd.png" alt="">
      </div>
      <div class="sticker-hover sticker-three">
        <img class="custom-sticker" src="assets/sticker-cake.png" alt="">
      </div>
      <div class="sticker-hover sticker-four">
        <img class="custom-sticker" src="assets/icon-sticker.png" alt="">
      </div>
      <div class="sticker-hover sticker-five">
        <img class="custom-sticker" src="assets/sticker-envelope.png" alt="">
      </div>
      <div class="sticker-hover sticker-six">
        <img class="custom-sticker" src="assets/sticker-patchset.png" alt="">
      </div>

      <nav class="desktop-dock" aria-label="Social links">
        <a class="dock-app icon-linkedin" href="https://www.linkedin.com/in/lg647/" target="_blank" rel="noreferrer" aria-label="LinkedIn">
          <span class="app-tile">
            <img src="assets/linkedin.jpg" alt="">
          </span>
          <span class="sr-only">LinkedIn</span>
        </a>
        <a class="dock-app icon-gmail" href="mailto:lg647@cornell.edu" aria-label="Gmail">
          <span class="app-tile">
            <img src="assets/gmail.jpg" alt="">
          </span>
          <span class="sr-only">Gmail</span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
